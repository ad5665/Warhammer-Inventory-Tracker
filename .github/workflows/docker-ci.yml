name: Docker CI

on:
  push:
    branches:
      - main
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

env:
  IMAGE_NAME: ad5665/warhammer-inventory-tracker

jobs:
  build-and-test:
    name: Build and test Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest pytest-cov

      - name: Run app tests
        run: |
          python -m compileall app
          python -m pytest --cov=app --cov-report=term-missing --cov-report=xml

      - name: Add coverage summary
        run: |
          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET

          root = ET.parse("coverage.xml").getroot()
          total_rate = float(root.attrib["line-rate"]) * 100
          branch_rate = float(root.attrib.get("branch-rate", 0)) * 100
          lines_valid = int(root.attrib.get("lines-valid", 0))
          lines_covered = int(root.attrib.get("lines-covered", 0))
          branches_valid = int(root.attrib.get("branches-valid", 0))
          branches_covered = int(root.attrib.get("branches-covered", 0))

          file_rows = []
          for file_node in root.findall("./packages/package/classes/class"):
              filename = file_node.attrib["filename"]
              line_rate = float(file_node.attrib["line-rate"]) * 100
              file_branch_rate = float(file_node.attrib.get("branch-rate", 0)) * 100
              file_rows.append((filename, line_rate, file_branch_rate))

          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          with open(summary_path, "a", encoding="utf-8") as summary:
              summary.write("## Test coverage\n\n")
              summary.write("| Metric | Covered | Total | Coverage |\n")
              summary.write("| --- | ---: | ---: | ---: |\n")
              summary.write(f"| Lines | {lines_covered} | {lines_valid} | {total_rate:.1f}% |\n")
              summary.write(f"| Branches | {branches_covered} | {branches_valid} | {branch_rate:.1f}% |\n\n")
              if file_rows:
                  summary.write("| File | Line coverage | Branch coverage |\n")
                  summary.write("| --- | ---: | ---: |\n")
                  for filename, line_rate, file_branch_rate in sorted(file_rows):
                      summary.write(f"| `{filename}` | {line_rate:.1f}% | {file_branch_rate:.1f}% |\n")
          PY

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          build-args: |
            WH40K_BUILD_VERSION=${{ github.sha }}
          load: true
          tags: wh40k-stock-tracker:ci

      - name: Start container
        run: |
          mkdir -p "${RUNNER_TEMP}/wh40k-data"
          docker run --detach \
            --name wh40k-stock-tracker \
            --publish 8000:8000 \
            --volume "${RUNNER_TEMP}/wh40k-data:/app/data" \
            wh40k-stock-tracker:ci

      - name: Wait for app
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:8000/api/status > /tmp/status.json; then
              exit 0
            fi
            sleep 1
          done

          docker logs wh40k-stock-tracker
          exit 1

      - name: Smoke test container
        run: |
          curl --fail --silent --show-error http://127.0.0.1:8000/ --output /tmp/index.html
          grep -q "Warhammer Stock Tracker" /tmp/index.html

          python - <<'PY'
          import json
          import os
          import pathlib
          import urllib.request

          def get_json(path: str):
              with urllib.request.urlopen(f"http://127.0.0.1:8000{path}", timeout=10) as response:
                  assert response.status == 200
                  return json.loads(response.read().decode("utf-8"))

          systems = get_json("/api/game-systems")
          system_ids = {system["id"] for system in systems}
          assert {"wh40k_10e", "kill_team"} <= system_ids, systems

          status = get_json("/api/status?game_system=wh40k_10e")
          assert status["game_system"] == "wh40k_10e", status
          assert status["database_path"] == "/app/data/stock_tracker.db", status

          db_path = pathlib.Path(os.environ["RUNNER_TEMP"]) / "wh40k-data" / "stock_tracker.db"
          assert db_path.exists(), f"Expected SQLite database at {db_path}"
          PY

      - name: Show container logs on failure
        if: failure()
        run: docker logs wh40k-stock-tracker

      - name: Stop container
        if: always()
        run: docker rm --force wh40k-stock-tracker || true

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          username: ad5665
          password: ${{ secrets.DOCKER_HUB }}

      - name: Tag image for Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag wh40k-stock-tracker:ci "${IMAGE_NAME}:latest"
          docker tag wh40k-stock-tracker:ci "${IMAGE_NAME}:main"
          docker tag wh40k-stock-tracker:ci "${IMAGE_NAME}:${GITHUB_SHA}"

      - name: Push image to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:main"
          docker push "${IMAGE_NAME}:${GITHUB_SHA}"
