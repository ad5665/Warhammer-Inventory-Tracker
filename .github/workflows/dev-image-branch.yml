name: Dev Image Branch Publish

on:
  push:
    branches:
      - web-mobile-sync-scope
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  IMAGE_NAME: ad5665/warhammer-inventory-tracker

jobs:
  build-and-push:
    name: Build and push dev image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set Docker tag
        id: docker-tag
        run: |
          tag="${GITHUB_REF_NAME//\//-}"
          tag="$(echo "$tag" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9_.-')"
          if [ -z "$tag" ]; then
            echo "Could not derive Docker tag from branch name: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ad5665
          password: ${{ secrets.DOCKER_HUB }}

      - name: Build and push dev image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            WH40K_BUILD_VERSION=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.docker-tag.outputs.tag }}
            ${{ env.IMAGE_NAME }}:dev
