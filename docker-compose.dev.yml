services:
  web:
    image: ${WH40K_DEV_IMAGE:-ad5665/warhammer-inventory-tracker:dev}
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      keycloak-realm-init:
        condition: service_completed_successfully
    ports:
      - "${WH40K_PORT:-8000}:${WH40K_PORT:-8000}"
    environment:
      WH40K_DATA_DIR: /app/data
      WH40K_AUTH_ENABLED: ${WH40K_AUTH_ENABLED:-true}
      WH40K_COOKIE_SECURE: "false"
      WH40K_PORT: ${WH40K_PORT:-8000}
      WH40K_CORS_ORIGINS: ${WH40K_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:19006,http://127.0.0.1:19006}
      AUTH_PROVIDER: ${AUTH_PROVIDER:-keycloak}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://127.0.0.1:8000}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-http://localhost:8081/realms/wh40k}
      OIDC_INTERNAL_ISSUER_URL: ${OIDC_INTERNAL_ISSUER_URL:-http://keycloak:8080/realms/wh40k}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-wh40k-web}
      OIDC_ADMIN_ROLE: ${OIDC_ADMIN_ROLE:-wh40k-admin}
      DATABASE_URL: ${DATABASE_URL:-postgresql://wh40k:wh40k@postgres:5432/wh40k}
      WH40K_DB_SCHEMA: ${WH40K_DB_SCHEMA:-public}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-s3}
      S3_BUCKET: ${S3_BUCKET:-wh40k-dev-uploads}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-wh40k}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-wh40k-secret}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    volumes:
      - wh40k-dev-data:/app/data

  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wh40k}
      POSTGRES_USER: ${POSTGRES_USER:-wh40k}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wh40k}
    volumes:
      - wh40k-dev-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-wh40k}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-wh40k-secret}
    volumes:
      - wh40k-dev-minio:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do
          sleep 1
        done
        mc mb --ignore-existing local/$${S3_BUCKET}
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-wh40k}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-wh40k-secret}
      S3_BUCKET: ${S3_BUCKET:-wh40k-dev-uploads}

  keycloak-db-init:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        psql "$${DATABASE_URL}" -c "CREATE SCHEMA IF NOT EXISTS keycloak;"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://wh40k:wh40k@postgres:5432/wh40k}

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    depends_on:
      keycloak-db-init:
        condition: service_completed_successfully
    command:
      - start-dev
      - --http-port=8080
      - --hostname=http://localhost:8081
      - --hostname-strict=false
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin-password}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin-password}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/wh40k
      KC_DB_USERNAME: ${POSTGRES_USER:-wh40k}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-wh40k}
      KC_DB_SCHEMA: keycloak
    volumes:
      - ./infra/keycloak/themes:/opt/keycloak/themes:ro
  keycloak-realm-init:
    image: quay.io/keycloak/keycloak:26.0
    depends_on:
      keycloak:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until /opt/keycloak/bin/kcadm.sh config credentials --server http://keycloak:8080 --realm master --user "$${KEYCLOAK_ADMIN}" --password "$${KEYCLOAK_ADMIN_PASSWORD}"; do
          sleep 2
        done
        if /opt/keycloak/bin/kcadm.sh get realms/wh40k >/dev/null 2>&1; then
          echo "Keycloak realm wh40k already exists."
        else
          /opt/keycloak/bin/kcadm.sh create realms -f /opt/keycloak/data/import/wh40k-realm.json
        fi
        /opt/keycloak/bin/kcadm.sh update realms/wh40k -s loginTheme=night-lords
        /opt/keycloak/bin/kcadm.sh update users/profile -r wh40k -f /opt/keycloak/data/import/wh40k-user-profile.json
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin-password}
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import:ro

volumes:
  wh40k-dev-data:
  wh40k-dev-postgres:
  wh40k-dev-minio:
